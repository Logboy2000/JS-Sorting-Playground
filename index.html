<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Playground</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;

        }
        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
            
        }
        select {
            background-color: black;
            color: white;
        }
        .popup {
            position: fixed;
            position-anchor: auto;
            width: fit-content;
            height: fit-content;
            color: white;
            background-color: #000000e7;
            inset: 0px;
            margin: auto;
            border-width: initial;
            border-style: solid;
            border-color: initial;
            border-image: initial;
            padding: 0.25em;
            overflow: auto;
            font: 11px 'Lucida Grande', sans-serif;
            transform: scale(2);
            filter: drop-shadow(0px 0px 5px black);
        }
        .popup h1 {
            text-align: center;
        }
        .popup button {
            display: block;
            margin: 0.5em auto;
            padding: 0.25em 1em;
            background-color: white;
            color: black;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="keybinds-popup" class="popup" style="display: none;">
        <h1>Keybinds</h1>
        <p>Space: Play/Pause</p>
        <p>+/-: Increase/Decrease Step Delay</p>
        <p>Arrow Right: Next Algorithm</p>
        <p>Arrow Left: Previous Algorithm</p>

        <p>H: Hide Menu</p>
        <p>G: Generate Array</p>
        <p>S: Save Settings</p>
        <p>C: Clear Settings</p>
        <button onclick="document.getElementById('keybinds-popup').style.display = 'none'">Okie Dokie 👍👍👍</button>
    </div>
    <canvas id="canvas"></canvas>
    <script type="text/javascript" src="dat.gui.min.js"></script>
    <script type="text/javascript" src="sorts.js"></script>
    <script src="index.js"></script>
    
    
</body>

</html>
